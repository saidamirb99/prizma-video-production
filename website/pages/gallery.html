    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" id="lightboxClose">&times;</button>
        <div class="lightbox__img" id="lightboxContent" style="width:80vw;max-width:900px;aspect-ratio:3/2;background:var(--glass);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:1.2rem;">Изображение</div>
    </div>

    <script type="module">
    import { CATEGORIES } from './gallery-template.js';

    // Get category from URL
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('cat') || CATEGORIES[0].slug;
    const cat = CATEGORIES.find(c => c.slug === slug) || CATEGORIES[0];

    // Page hero
    document.getElementById('pageTitle').textContent = `${cat.title} — PRIZMA`;
    document.getElementById('heroTitle').textContent = cat.title;
    document.getElementById('heroDesc').textContent = cat.desc;
    document.getElementById('breadcrumbCurrent').textContent = cat.title;
    document.getElementById('pageHero').style.setProperty('--page-hue', cat.hue);

    // Sidebar
    const sidebarNav = document.getElementById('sidebarNav');
    const photoIcon = '<svg class="sidebar__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>';
    const videoIcon = '<svg class="sidebar__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>';

    CATEGORIES.forEach(c => {
        const a = document.createElement('a');
        a.href = `gallery.html?cat=${c.slug}`;
        a.className = 'sidebar__link' + (c.slug === slug ? ' active' : '');
        a.innerHTML = `${c.type === 'photo' ? photoIcon : videoIcon}<span>${c.title}</span><span class="sidebar__count">${c.count}</span>`;
        sidebarNav.appendChild(a);
    });

    // Masonry grid
    const grid = document.getElementById('masonryGrid');

    if (cat.type === 'photo') {
        for (let i = 0; i < cat.count; i++) {
            const h = cat.heights[i] || (180 + Math.random() * 150);
            const itemHue = cat.hue + Math.round((Math.random() - 0.5) * 30);
            grid.innerHTML += `
                <div class="masonry__item" data-index="${i}" style="--item-hue:${itemHue}">
                    <div class="masonry__placeholder" style="height:${h}px"></div>
                    <div class="masonry__item-overlay">
                        <div class="masonry__zoom">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </div>
                    </div>
                </div>`;
        }
    } else {
        // Video grid — use different layout
        grid.style.columns = '2';
        for (let i = 0; i < cat.count; i++) {
            const itemHue = cat.hue + Math.round((Math.random() - 0.5) * 30);
            grid.innerHTML += `
                <div class="masonry__item masonry__item--video" data-index="${i}" style="--item-hue:${itemHue}">
                    <div class="masonry__placeholder"></div>
                    <div class="masonry__play">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
                    </div>
                </div>`;
        }
    }

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxClose = document.getElementById('lightboxClose');

    grid.addEventListener('click', (e) => {
        const item = e.target.closest('.masonry__item');
        if (item) lightbox.classList.add('active');
    });

    lightboxClose.addEventListener('click', () => lightbox.classList.remove('active'));
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) lightbox.classList.remove('active');
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') lightbox.classList.remove('active');
    });

    // Mobile menu
    const burger = document.getElementById('burger');
    const navMenu = document.getElementById('navMenu');
    burger.addEventListener('click', () => {
        burger.classList.toggle('active');
        navMenu.classList.toggle('active');
        document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
    });
    navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            burger.classList.remove('active');
            navMenu.classList.remove('active');
            document.body.style.overflow = '';
        });
    });

    // Nav scroll
    window.addEventListener('scroll', () => {
        document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
    });

    // Reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.masonry__item').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = `opacity 0.5s ${i * 0.05}s ease, transform 0.5s ${i * 0.05}s ease`;
        observer.observe(el);
    });
    </script>
</body>
